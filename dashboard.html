<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
      
    <nav class="navbar">

        <div class="logo">
            <img src="assets/github-logo.png">
            <h2>GitHub Issues Tracker</h2>
        </div>

        <div class="nav-right">

            <input id="searchText" placeholder="Search issues...">

            <button class="search-btn" onclick="searchIssue()">
                Search
            </button>

            <button class="new-btn">
                + New Issue
            </button>

        </div>

    </nav>


    <div class="tabs">

        <button class="active" onclick="loadIssues(this)">
            All
        </button>

        <button onclick="filterIssues('open', this)">
            Open
        </button>

        <button onclick="filterIssues('closed', this)">
            Closed
        </button>

    </div>


    <div class="issue-header">

        <div class="issue-left">

            <img src="assets/Aperture.png" class="issue-icon">

            <div>
                <h3 id="issueCount">0 Issues</h3>
                <p>Track and manage your project issues</p>
            </div>

        </div>

        <div class="status">

            <span class="open-dot"></span>
            Open

            <span class="closed-dot"></span>
            Closed

        </div>

    </div>

    
      <!-- Loader -->

    <div id="loader" class="loader">
        <div class="spinner"></div>
    </div>


    <div id="issues-container" class="issues-grid"></div>


    <!-- Modal -->

    <div id="issueModal" class="modal">

        <div class="modal-content">

            <div class="modal-header">

                <h2 id="modalTitle"></h2>

                <span class="close-x">
                    &times;
                </span>

            </div>


            <div class="top-row">

                <span id="modalStatus" class="status"></span>

                <span class="meta">

                    Opened by
                    <b id="modalAuthor"></b>

                    •

                    <span id="modalDate"></span>

                </span>

            </div>


            <div id="modalLabels" class="modal-labels"></div>


            <p id="modalDescription" class="modal-desc"></p>


            <div class="info-box">

                <div>

                    <p class="info-title">
                        Assignee
                    </p>

                    <h4 id="modalAssignee"></h4>

                </div>


                <div>

                    <p class="info-title">
                        Priority
                    </p>

                    <span id="modalPriority" class="priority-pill"></span>

                </div>

            </div>


            <div class="modal-footer">

                <button class="close-btn">
                    Close
                </button>

            </div>

        </div>

    </div>


    <script src="dashboard.js"></script>

</body>
</html>
